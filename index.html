<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#225ea8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Lala Bahasa — тренажёр слов</title>
<style>
  :root{
    --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --line:#334155;
    --txt:#e2e8f0; --mut:#94a3b8; --acc:#3b82f6; --acc2:#225ea8;
    --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  h1{font-size:18px;margin:0;font-weight:700}
  .sub{color:var(--mut);font-size:12px}
  .banner{background:#7c2d12;color:#fed7aa;font-size:12px;padding:8px 10px;border-radius:10px;margin-bottom:10px;display:none}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  button{font-family:inherit;cursor:pointer}
  .mode{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:16px 12px;color:var(--txt);text-align:left;font-size:15px;font-weight:600}
  .mode small{display:block;color:var(--mut);font-weight:400;font-size:12px;margin-top:4px}
  .mode.active{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .seg button{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 8px;font-size:12.5px}
  .seg button.active{background:var(--acc2);border-color:var(--acc)}
  .btn{display:block;width:100%;background:var(--acc);border:none;color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;margin-top:6px}
  .btn.sec{background:var(--bg2);border:1px solid var(--line);color:var(--txt)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut);font-weight:600;font-size:14px;padding:11px}
  .row{display:flex;gap:8px}
  .row .btn{margin-top:0}
  .prompt{font-size:13px;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  .q{font-size:26px;font-weight:700;line-height:1.25;margin:6px 0 4px}
  .q.small{font-size:21px}
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);border-radius:12px;padding:14px;font-size:18px;margin-top:10px}
  input[type=text]:focus{outline:none;border-color:var(--acc)}
  .fb{border-radius:12px;padding:12px 14px;margin-top:12px;font-size:15px;display:none}
  .fb.ok{background:rgba(34,197,94,.12);border:1px solid var(--ok);color:#bbf7d0}
  .fb.bad{background:rgba(239,68,68,.12);border:1px solid var(--bad);color:#fecaca}
  .fb b{color:#fff}
  .fb .pron{color:var(--mut);font-size:13px;margin-top:4px}
  .mic{width:96px;height:96px;border-radius:50%;border:none;background:var(--acc);color:#fff;font-size:38px;margin:14px auto;display:block}
  .mic.rec{background:var(--bad);animation:pulse 1s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 18px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
  .play{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:50px;padding:14px 20px;font-size:16px;font-weight:600;margin:6px auto;display:block}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .stat{background:var(--bg2);border-radius:12px;padding:12px;text-align:center}
  .stat .n{font-size:24px;font-weight:800}
  .stat .l{font-size:11px;color:var(--mut);margin-top:2px}
  .lvl{text-align:center;padding:14px;background:linear-gradient(135deg,var(--acc2),#7c3aed);border-radius:14px;margin-bottom:10px}
  .lvl .big{font-size:30px;font-weight:800}
  .lvl .l{font-size:12px;opacity:.9}
  .bar{height:8px;background:var(--bg);border-radius:6px;overflow:hidden;margin-top:8px}
  .bar i{display:block;height:100%;background:var(--ok)}
  .hidden{display:none!important}
  footer{margin-top:auto;padding-top:12px;text-align:center;color:var(--mut);font-size:11px}
  a.link{color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Lala Bahasa</h1>
      <div class="sub">тренажёр индонезийских слов</div>
    </div>
    <button class="btn ghost" style="width:auto;margin:0;padding:8px 12px" id="navStats">Прогресс</button>
  </header>

  <div class="banner" id="banner"></div>

  <!-- HOME -->
  <section id="home">
    <div class="card">
      <div class="prompt">Тип упражнения</div>
      <div class="grid" style="margin-top:8px">
        <button class="mode active" data-mode="spelling">✍️ Написание<small>печатать слово</small></button>
        <button class="mode" data-mode="listening">👂 На слух<small>аудио → текст</small></button>
        <button class="mode" data-mode="pron">🎤 Произношение<small>говорить вслух</small></button>
        <button class="mode" data-mode="mix">🎲 Микс<small>всё вперемешку</small></button>
      </div>
      <div id="dirWrap" style="margin-top:12px">
        <div class="prompt">Направление</div>
        <div class="seg" id="dirSeg"></div>
      </div>
    </div>
    <button class="btn" id="start">Начать тренировку</button>
    <div class="card" style="margin-top:12px">
      <div class="prompt">Коротко о прогрессе</div>
      <div class="stats" id="homeStats"></div>
    </div>
  </section>

  <!-- EXERCISE -->
  <section id="exercise" class="hidden">
    <div class="card">
      <div class="prompt" id="exKind">—</div>
      <div class="q" id="exQ">—</div>
      <div id="exExtra"></div>

      <!-- typed answer -->
      <div id="typeBox">
        <input type="text" id="answer" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Ваш ответ…">
        <div class="row" style="margin-top:10px">
          <button class="btn" id="check">Проверить</button>
          <button class="btn sec" id="dunno" style="width:46%">Не помню</button>
        </div>
      </div>

      <!-- listening controls -->
      <div id="listenBox" class="hidden">
        <button class="play" id="replay">🔊 Прослушать ещё раз</button>
      </div>

      <!-- pron controls -->
      <div id="pronBox" class="hidden">
        <button class="mic" id="mic">🎤</button>
        <div style="text-align:center;color:var(--mut);font-size:13px" id="micHint">Нажмите и произнесите вслух</div>
        <button class="play" id="hearIt" style="margin-top:10px">🔊 Послушать образец</button>
      </div>

      <div class="fb" id="fb"></div>
    </div>
    <button class="btn hidden" id="next">Дальше →</button>
    <button class="btn ghost" id="quit">Закончить</button>
  </section>

  <!-- STATS -->
  <section id="stats" class="hidden">
    <div class="lvl">
      <div class="l">Оценка уровня (приблизительно)</div>
      <div class="big" id="lvlBig">A0</div>
      <div class="l" id="lvlNote"></div>
      <div class="bar"><i id="lvlBar" style="width:0%"></i></div>
    </div>
    <div class="card">
      <div class="stats" id="fullStats"></div>
    </div>
    <button class="btn sec" id="backHome">← К тренировке</button>
    <button class="btn ghost" id="reset">Сбросить прогресс</button>
  </section>

  <footer>
    База: <span id="baseN">0</span> слов · обновлена <span id="baseD">—</span><br>
    Lala Bahasa · работает офлайн
  </footer>
</div>

<script src="base.js"></script>
<script>
(function(){
  "use strict";
  var BASE = (window.LALA_BASE || []).filter(function(x){return x && x.id_text;});
  var PKEY = "lala_progress_v1";
  var SKEY = "lala_settings_v1";
  var MASTER_BOX = 4, MAX_BOX = 5;

  // ---------- storage ----------
  function loadProg(){ try{return JSON.parse(localStorage.getItem(PKEY))||{};}catch(e){return {};} }
  function saveProg(p){ try{localStorage.setItem(PKEY,JSON.stringify(p));}catch(e){} }
  function loadSet(){ try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(e){return {};} }
  function saveSet(s){ try{localStorage.setItem(SKEY,JSON.stringify(s));}catch(e){} }
  var prog = loadProg();
  var set = loadSet();
  var mode = set.mode || "spelling";
  var dir = set.dir || "both";

  // ---------- helpers ----------
  function norm(s){
    return (s||"").toLowerCase()
      .replace(/ё/g,"е")
      .replace(/[.,!?;:()"'«»—–\-]/g," ")
      .replace(/\s+/g," ").trim();
  }
  function ruVariants(ru){
    // делим по ; / и « или » на СЫРОЙ строке, потом нормализуем каждый кусок
    return (ru||"").split(/[\/;]| или /).map(function(s){return norm(s);}).filter(Boolean);
  }
  function lev(a,b){
    a=a||"";b=b||"";
    var m=a.length,n=b.length;
    if(!m)return n; if(!n)return m;
    var d=[]; for(var i=0;i<=m;i++)d[i]=[i];
    for(var j=0;j<=n;j++)d[0][j]=j;
    for(i=1;i<=m;i++)for(j=1;j<=n;j++){
      var c=a[i-1]===b[j-1]?0:1;
      d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);
    }
    return d[m][n];
  }
  function sim(a,b){
    a=norm(a);b=norm(b);
    if(!a&&!b)return 1;
    var L=Math.max(a.length,b.length)||1;
    return 1-lev(a,b)/L;
  }
  function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

  // ---------- selection (Leitner-weighted) ----------
  var lastId=null;
  function box(id){ var p=prog[id]; return p?p.box:0; }
  function weight(item){
    var p=prog[item.id];
    if(!p) return 7;            // новое слово — вводим
    var w=[6,5,4,3,2,1][p.box]||1;
    return w;
  }
  function nextItem(){
    var pool=BASE.filter(function(x){return x.id!==lastId;});
    if(!pool.length)pool=BASE.slice();
    var total=0, weights=pool.map(function(x){var w=weight(x);total+=w;return w;});
    var r=Math.random()*total, acc=0, chosen=pool[0];
    for(var i=0;i<pool.length;i++){acc+=weights[i];if(r<=acc){chosen=pool[i];break;}}
    lastId=chosen.id;
    return chosen;
  }
  function record(item, correct){
    var p=prog[item.id]||{box:0,seen:0,correct:0,wrong:0};
    p.seen++;
    if(correct){p.correct++; p.box=Math.min(MAX_BOX,p.box+1);}
    else {p.wrong++; p.box=Math.max(0,p.box-1);}
    p.last=Date.now();
    prog[item.id]=p; saveProg(prog);
  }

  // ---------- stats / level ----------
  function calcStats(){
    var mastered=0, seen=0, correct=0, attempts=0, started=0;
    BASE.forEach(function(x){
      var p=prog[x.id]; if(!p)return;
      started++;
      if(p.box>=MASTER_BOX)mastered++;
      correct+=p.correct; attempts+=(p.correct+p.wrong);
    });
    var acc=attempts?Math.round(100*correct/attempts):0;
    return {mastered:mastered,started:started,total:BASE.length,acc:acc,attempts:attempts};
  }
  function levelOf(m){
    // приблизительная оценка по числу освоенных единиц
    var L=[[0,"A0","самый старт"],[10,"A0+","первые слова"],[25,"A1","базовый разговор"],
           [50,"A1+","уверенный быт"],[90,"A2","свободнее в быту"],[150,"A2+","ближе к B1"]];
    var cur=L[0];
    for(var i=0;i<L.length;i++){ if(m>=L[i][0])cur=L[i]; }
    // next threshold
    var nxt=null; for(i=0;i<L.length;i++){ if(L[i][0]>m){nxt=L[i];break;} }
    return {code:cur[1],label:cur[2],next:nxt};
  }

  // ---------- DOM ----------
  var $=function(id){return document.getElementById(id);};
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var hasSR = !!SR;
  var voices=[];
  function loadVoices(){ voices=window.speechSynthesis?speechSynthesis.getVoices():[]; }
  if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
  function speak(text){
    if(!window.speechSynthesis)return;
    try{
      speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      u.lang="id-ID"; u.rate=0.92;
      var v=voices.filter(function(x){return /^id/i.test(x.lang);})[0];
      if(v)u.voice=v;
      speechSynthesis.speak(u);
    }catch(e){}
  }

  // direction option sets
  var DIRS={
    spelling:[["both","Оба"],["ru2id","РУ → ID"],["id2ru","ID → РУ"]],
    listening:[["both","Оба"],["dict","Диктант"],["comp","Понимание"]],
    pron:[["both","Оба"],["read","Прочитать вслух"],["mean","По смыслу"]],
    mix:[["both","—"]]
  };

  function renderDirs(){
    var seg=$("dirSeg"); seg.innerHTML="";
    var opts=DIRS[mode]||[["both","Оба"]];
    $("dirWrap").style.display = mode==="mix" ? "none" : "block";
    if(!opts.some(function(o){return o[0]===dir;})) dir="both";
    opts.forEach(function(o){
      var b=document.createElement("button");
      b.textContent=o[1]; b.className=(o[0]===dir?"active":"");
      b.onclick=function(){dir=o[0];set.dir=dir;saveSet(set);renderDirs();};
      seg.appendChild(b);
    });
  }
  function renderModes(){
    document.querySelectorAll(".mode").forEach(function(b){
      b.classList.toggle("active", b.dataset.mode===mode);
    });
  }
  function renderHomeStats(){
    var s=calcStats();
    $("homeStats").innerHTML =
      stat(s.mastered,"выучено") + stat(s.started,"в работе") +
      stat(s.acc+"%","точность") + stat(s.total,"всего в базе");
  }
  function stat(n,l){return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}

  // ---------- session ----------
  var cur=null, curType=null, curDir=null, answered=false;

  function resolveTypeDir(){
    var t=mode, d=dir;
    if(mode==="mix"){ t=pick(["spelling","listening","pron"]); }
    if(t==="spelling"){ if(d==="both"||mode==="mix")d=pick(["ru2id","id2ru"]); }
    else if(t==="listening"){ if(d==="both"||mode==="mix")d=pick(["dict","comp"]); }
    else if(t==="pron"){ if(d==="both"||mode==="mix")d=pick(["read","mean"]);
      if(!hasSR){ /* still allow with self-check */ } }
    return {t:t,d:d};
  }

  function show(id){ ["home","exercise","stats"].forEach(function(s){$(s).classList.toggle("hidden",s!==id);}); }

  function startSession(){ show("exercise"); loadNext(); }

  function loadNext(){
    answered=false;
    cur=nextItem();
    var td=resolveTypeDir(); curType=td.t; curDir=td.d;
    $("fb").style.display="none"; $("fb").className="fb";
    $("next").classList.add("hidden");
    $("typeBox").classList.add("hidden");
    $("listenBox").classList.add("hidden");
    $("pronBox").classList.add("hidden");
    $("exExtra").innerHTML="";
    var ans=$("answer"); ans.value="";

    if(curType==="spelling"){
      $("exKind").textContent = curDir==="ru2id" ? "Написание · РУ → Bahasa" : "Написание · Bahasa → РУ";
      $("exQ").textContent = curDir==="ru2id" ? cur.ru : cur.id_text;
      $("exQ").className="q"+(curDir==="ru2id"?"":" small");
      if(curDir==="id2ru"){ $("exExtra").innerHTML='<div class="sub" style="color:var(--mut);font-size:12px;margin-top:4px">'+cur.pron+'</div>'; }
      $("typeBox").classList.remove("hidden");
      ans.placeholder = curDir==="ru2id"?"Напишите на бахасе…":"Напишите перевод…";
      setTimeout(function(){ans.focus();},50);
    }
    else if(curType==="listening"){
      $("exKind").textContent = curDir==="dict" ? "На слух · Диктант" : "На слух · Понимание";
      $("exQ").textContent = "🔊";
      $("exQ").className="q";
      $("listenBox").classList.remove("hidden");
      $("typeBox").classList.remove("hidden");
      ans.placeholder = curDir==="dict"?"Напишите, что услышали (бахаса)…":"Напишите перевод на русском…";
      speak(cur.id_text);
      setTimeout(function(){ans.focus();},50);
    }
    else if(curType==="pron"){
      $("exKind").textContent = curDir==="read" ? "Произношение · Прочитать вслух" : "Произношение · По смыслу";
      if(curDir==="read"){
        $("exQ").textContent=cur.id_text; $("exQ").className="q small";
        $("exExtra").innerHTML='<div class="sub" style="color:var(--mut);font-size:12px;margin-top:4px">'+cur.pron+' · '+cur.ru+'</div>';
      }else{
        $("exQ").textContent=cur.ru; $("exQ").className="q";
        $("exExtra").innerHTML='<div class="sub" style="color:var(--mut);font-size:12px;margin-top:4px">скажите это на бахасе</div>';
      }
      $("pronBox").classList.remove("hidden");
      $("micHint").textContent = hasSR ? "Нажмите и произнесите вслух" : "Распознавание недоступно — послушайте образец и оцените себя";
      $("mic").style.display = hasSR ? "block" : "none";
      if(!hasSR){
        // self-check buttons
        $("micHint").insertAdjacentHTML("afterend",
          '<div class="row" style="margin-top:10px"><button class="btn" id="selfOk">✅ Сказал верно</button><button class="btn sec" id="selfBad" style="width:46%">❌ Нет</button></div>');
        $("selfOk").onclick=function(){finishPron(1,"(самооценка)");};
        $("selfBad").onclick=function(){finishPron(0,"(самооценка)");};
      }
    }
  }

  function showFeedback(ok, correctText, extra){
    answered=true;
    var fb=$("fb");
    fb.className="fb "+(ok?"ok":"bad");
    var html = ok ? "<b>Верно!</b>" : "<b>Правильно:</b> "+correctText;
    if(extra) html+=extra;
    // always show meaning + pronunciation for learning
    html += '<div class="pron">'+cur.id_text+' — '+cur.ru+'<br>['+cur.pron+']</div>';
    fb.innerHTML=html; fb.style.display="block";
    $("next").classList.remove("hidden");
    $("typeBox").classList.add("hidden");
    // re-speak so the ear remembers
    if(curType!=="pron") speak(cur.id_text);
  }

  function checkTyped(){
    if(answered)return;
    var val=$("answer").value;
    if(!val.trim()){ return; }
    var ok=false, target;
    if(curType==="spelling"){
      if(curDir==="ru2id"){ target=cur.id_text; ok=sim(val,cur.id_text)>=0.88 || norm(val)===norm(cur.id_text); }
      else { target=cur.ru; ok=ruVariants(cur.ru).some(function(v){return v===norm(val)||sim(norm(val),v)>=0.88;}); }
    } else if(curType==="listening"){
      if(curDir==="dict"){ target=cur.id_text; ok=sim(val,cur.id_text)>=0.88 || norm(val)===norm(cur.id_text); }
      else { target=cur.ru; ok=ruVariants(cur.ru).some(function(v){return v===norm(val)||sim(norm(val),v)>=0.88;}); }
    }
    record(cur, ok);
    showFeedback(ok, target);
  }
  function dunno(){
    if(answered)return;
    var target = (curType==="spelling"&&curDir==="id2ru")||(curType==="listening"&&curDir==="comp") ? cur.ru : cur.id_text;
    record(cur,false);
    showFeedback(false,target);
  }

  // pronunciation
  var rec=null, recBusy=false;
  function startRec(){
    if(!hasSR||recBusy)return;
    recBusy=true;
    $("mic").classList.add("rec"); $("micHint").textContent="Слушаю… говорите";
    rec=new SR(); rec.lang="id-ID"; rec.interimResults=false; rec.maxAlternatives=3;
    rec.onresult=function(e){
      var best="", bestScore=0;
      for(var i=0;i<e.results[0].length;i++){
        var t=e.results[0][i].transcript;
        var s=sim(t,cur.id_text);
        if(s>bestScore){bestScore=s;best=t;}
      }
      var score=Math.round(bestScore*100);
      var ok=bestScore>=0.75;
      finishPron(ok?1:0, "Распознано: «"+best+"» · совпадение "+score+"%");
    };
    rec.onerror=function(ev){ $("mic").classList.remove("rec"); recBusy=false; $("micHint").textContent="Не расслышал, попробуйте ещё раз"; };
    rec.onend=function(){ $("mic").classList.remove("rec"); recBusy=false; };
    try{rec.start();}catch(e){recBusy=false;$("mic").classList.remove("rec");}
  }
  function finishPron(ok, extraText){
    if(answered)return;
    recBusy=false; $("mic").classList.remove("rec");
    record(cur, !!ok);
    showFeedback(!!ok, cur.id_text, extraText?'<div class="pron">'+extraText+'</div>':"");
    $("pronBox").classList.add("hidden");
  }

  // ---------- events ----------
  document.querySelectorAll(".mode").forEach(function(b){
    b.onclick=function(){ mode=b.dataset.mode; set.mode=mode; saveSet(set); renderModes(); renderDirs(); };
  });
  $("start").onclick=startSession;
  $("check").onclick=checkTyped;
  $("answer").addEventListener("keydown",function(e){ if(e.key==="Enter"){ if(answered)loadNext(); else checkTyped(); } });
  $("dunno").onclick=dunno;
  $("next").onclick=loadNext;
  $("quit").onclick=function(){ show("home"); renderHomeStats(); };
  $("replay").onclick=function(){ speak(cur.id_text); };
  $("hearIt").onclick=function(){ speak(cur.id_text); };
  $("mic").onclick=startRec;
  $("navStats").onclick=function(){ renderStats(); show("stats"); };
  $("backHome").onclick=function(){ show("home"); renderHomeStats(); };
  $("reset").onclick=function(){
    if(confirm("Сбросить весь прогресс? Это нельзя отменить.")){ prog={}; saveProg(prog); renderStats(); renderHomeStats(); }
  };

  function renderStats(){
    var s=calcStats(); var lv=levelOf(s.mastered);
    $("lvlBig").textContent=lv.code;
    var note=lv.label;
    if(lv.next) note+=" · до «"+lv.next[1]+"» ещё "+(lv.next[0]-s.mastered)+" слов";
    $("lvlNote").textContent=note;
    var pct = lv.next ? Math.round(100*(s.mastered)/(lv.next[0]||1)) : 100;
    $("lvlBar").style.width=Math.min(100,pct)+"%";
    $("fullStats").innerHTML =
      stat(s.mastered,"выучено (закреплено)") + stat(s.started,"в работе") +
      stat(s.acc+"%","точность ответов") + stat(s.attempts,"всего ответов") +
      stat(s.total,"слов в базе") + stat(Math.max(0,s.total-s.started),"ещё не открыто");
  }

  // ---------- init ----------
  function init(){
    if(!BASE.length){ $("banner").style.display="block"; $("banner").textContent="База слов не загрузилась (base.js)."; }
    $("baseN").textContent=BASE.length;
    $("baseD").textContent=window.LALA_BASE_DATE||"—";
    var warn=[];
    if(location.protocol==="file:") warn.push("Открыто как файл — для микрофона и установки иконки нужен https-адрес.");
    if(!hasSR) warn.push("Распознавание речи недоступно в этом браузере — произношение будет с самооценкой.");
    if(warn.length){ $("banner").style.display="block"; $("banner").innerHTML=warn.join("<br>"); }
    renderModes(); renderDirs(); renderHomeStats();
  }
  init();

  // service worker
  if("serviceWorker" in navigator){
    window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
})();
</script>
</body>
</html>
